<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACME 発注処理システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --border2: #3d4260;
    --accent: #4f7fff;
    --accent2: #7c5cfc;
    --green: #2dd4a7;
    --amber: #f5a623;
    --red: #ff4f6a;
    --text: #e8eaf2;
    --text2: #8b90a8;
    --text3: #555a72;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.1em;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
    font-family: var(--mono);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: calc(100vh - 52px);
  }

  /* Panel base */
  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text2);
    text-transform: uppercase;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* Upload zone */
  .upload-zone {
    margin: 16px;
    border: 1.5px dashed var(--border2);
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--accent);
    background: rgba(79,127,255,0.04);
  }
  .upload-icon {
    font-size: 24px;
    margin-bottom: 10px;
    opacity: 0.5;
  }
  .upload-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .upload-sub {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }
  #fileInput { display: none; }

  /* Order list */
  .order-item {
    margin: 0 12px 6px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .order-item:hover { border-color: var(--border2); }
  .order-item.active {
    border-color: var(--accent);
    background: rgba(79,127,255,0.06);
  }
  .order-item-name {
    font-weight: 500;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .order-item-meta {
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
    display: flex;
    gap: 8px;
  }
  .order-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-weight: 500;
  }
  .badge-pending { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .badge-done { background: rgba(45,212,167,0.12); color: var(--green); border: 1px solid rgba(45,212,167,0.25); }
  .badge-ai { background: rgba(124,92,252,0.12); color: #a78bfa; border: 1px solid rgba(124,92,252,0.25); }

  /* Center panel - form */
  .center-panel {
    background: var(--bg);
    overflow-y: auto;
  }

  .form-section {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .form-row.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .form-row.single { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-label {
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .form-input, .form-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: var(--sans);
    transition: border-color 0.15s;
    width: 100%;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(79,127,255,0.04);
  }
  .form-input.ai-filled {
    border-color: rgba(124,92,252,0.4);
    background: rgba(124,92,252,0.05);
  }
  .form-input.modified {
    border-color: rgba(245,166,35,0.4);
    background: rgba(245,166,35,0.04);
  }

  /* Window section */
  .window-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .window-tab {
    padding: 6px 14px;
    border-radius: 5px 5px 0 0;
    font-size: 11px;
    cursor: pointer;
    color: var(--text2);
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .window-tab.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
    border-bottom-color: var(--surface);
    margin-bottom: -1px;
  }
  .window-tab:hover:not(.active) { color: var(--text); }

  .add-window-btn {
    padding: 6px 10px;
    border-radius: 5px 5px 0 0;
    font-size: 16px;
    cursor: pointer;
    color: var(--text3);
    border: 1px dashed var(--border);
    border-bottom: none;
    background: transparent;
    transition: all 0.15s;
    line-height: 1;
  }
  .add-window-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* 要尺 result */
  .yousyaku-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 12px;
  }
  .yousyaku-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .yousyaku-row:last-child { border-bottom: none; }
  .yousyaku-label { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  .yousyaku-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
  }
  .yousyaku-val.highlight {
    color: var(--green);
    font-size: 15px;
  }
  .yousyaku-formula {
    font-size: 9px;
    color: var(--text3);
    font-family: var(--mono);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    line-height: 1.8;
  }

  /* Right panel - preview/output */
  .right-panel { background: var(--surface); }

  .preview-order {
    margin: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    font-size: 11px;
  }
  .preview-title {
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
    color: var(--text);
  }
  .preview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
    font-family: var(--mono);
  }
  .preview-table th {
    background: var(--surface2);
    padding: 5px 7px;
    text-align: left;
    color: var(--text2);
    font-weight: 500;
    border: 1px solid var(--border);
    font-size: 9px;
    letter-spacing: 0.05em;
  }
  .preview-table td {
    padding: 5px 7px;
    border: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }
  .preview-table td.highlight-cell {
    color: var(--green);
    font-weight: 500;
  }

  /* Action buttons */
  .action-bar {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .btn {
    padding: 9px 16px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: var(--sans);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

  /* AI processing overlay */
  .ai-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,17,23,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .ai-overlay.show { display: flex; }
  .ai-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 32px 40px;
    text-align: center;
    max-width: 320px;
  }
  .ai-spinner {
    width: 36px;
    height: 36px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-label { font-size: 13px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .ai-sub { font-size: 11px; color: var(--text2); font-family: var(--mono); }

  /* API key input */
  .apikey-section {
    margin: 12px;
    padding: 12px 14px;
    background: rgba(79,127,255,0.05);
    border: 1px solid rgba(79,127,255,0.2);
    border-radius: 6px;
  }
  .apikey-label { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-bottom: 6px; }
  .apikey-row { display: flex; gap: 6px; }
  .apikey-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 11px;
    font-family: var(--mono);
  }
  .apikey-input:focus { outline: none; border-color: var(--accent); }
  .apikey-save {
    padding: 6px 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--text);
    z-index: 300;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(45,212,167,0.4); }
  .toast.error { border-color: rgba(255,79,106,0.4); }

  /* Warning strip */
  .warn-strip {
    margin: 8px 12px;
    padding: 8px 12px;
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 5px;
    font-size: 10px;
    color: var(--amber);
    font-family: var(--mono);
    line-height: 1.6;
  }

  .divider { height: 1px; background: var(--border); margin: 0 12px; }

  /* 印刷用スタイル */
  @media print {
    @page { size: A4 landscape; margin: 10mm 12mm; }
    body { background: #fff !important; color: #000 !important; font-size: 11pt; }
    .header, .layout > .panel:first-child, .layout > .panel:last-child,
    .action-bar, .window-tabs, #emptyState, #previewEmpty,
    .ai-overlay, .toast { display: none !important; }
    .layout { display: block !important; height: auto !important; }
    .center-panel { display: none !important; }
    #printArea {
      display: block !important;
      padding: 0;
      color: #000;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .po-title {
      text-align: center;
      font-size: 16pt;
      font-weight: bold;
      letter-spacing: 0.3em;
      margin-bottom: 6mm;
      border-bottom: 2px solid #000;
      padding-bottom: 3mm;
    }
    .po-meta {
      font-size: 9pt;
      margin-bottom: 4mm;
      display: flex;
      justify-content: space-between;
    }
    .po-section { margin-bottom: 4mm; }
    .po-section-title {
      font-size: 9pt;
      font-weight: bold;
      border-left: 3px solid #000;
      padding-left: 4px;
      margin-bottom: 2mm;
    }
    .po-info-table { width: 100%; border-collapse: collapse; font-size: 10pt; margin-bottom: 4mm; }
    .po-info-table th {
      background: #f0f0f0;
      border: 1px solid #aaa;
      padding: 3px 6px;
      font-weight: bold;
      white-space: nowrap;
      width: 80px;
    }
    .po-info-table td { border: 1px solid #aaa; padding: 3px 6px; }
    .po-main-table { width: 100%; border-collapse: collapse; font-size: 8pt; }
    .po-main-table th {
      background: #e8e8e8;
      border: 1px solid #888;
      padding: 3px 2px;
      text-align: center;
      font-weight: bold;
      font-size: 7pt;
    }
    .po-main-table td {
      border: 1px solid #aaa;
      padding: 3px 2px;
      text-align: center;
      vertical-align: middle;
      font-size: 8pt;
    }
    .po-main-table td.left { text-align: left; }
    .po-yousyaku { font-weight: bold; font-size: 10pt; }
    .po-total {
      text-align: right;
      font-size: 11pt;
      font-weight: bold;
      margin-top: 3mm;
      border-top: 1px solid #000;
      padding-top: 2mm;
    }
    .po-footer {
      margin-top: 6mm;
      font-size: 8pt;
      border-top: 1px solid #ccc;
      padding-top: 3mm;
      display: flex;
      justify-content: space-between;
    }
    .po-sign-box {
      border: 1px solid #000;
      width: 60mm;
      height: 15mm;
      display: inline-block;
    }
    .po-sender {
      font-size: 9pt;
      text-align: right;
      line-height: 1.8;
    }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-size: 12px;
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  /* Highlight for AI extracted fields */
  .ai-tag {
    font-size: 8px;
    padding: 1px 5px;
    background: rgba(124,92,252,0.15);
    color: #a78bfa;
    border-radius: 3px;
    font-family: var(--mono);
    vertical-align: middle;
    margin-left: 4px;
  }

  select option { background: var(--surface); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <span class="logo-badge">ACME</span>
    発注処理システム
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    Claude API 接続中
  </div>
</div>

<div class="layout">

  <!-- Left: 案件リスト -->
  <div class="panel" id="leftPanel">
    <div class="panel-header">
      案件リスト
      <span style="color:var(--text3);font-size:9px;" id="orderCount">0件</span>
    </div>

    <div class="apikey-section">
      <div class="apikey-label">Claude API Key</div>
      <div class="apikey-row">
        <input type="password" class="apikey-input" id="apiKeyInput" placeholder="sk-ant-..." />
        <button class="apikey-save" onclick="saveApiKey()">保存</button>
      </div>
    </div>

    <div style="padding:12px 12px 8px;">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">⬆</div>
        <div class="upload-label">PDFをドロップ または クリック</div>
        <div class="upload-sub">ACME発注書（複数可）</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,image/*" multiple onchange="handleFileSelect(event)">
    </div>

    <div id="orderList" style="flex:1;padding-bottom:12px;">
      <!-- サンプルデータ -->
    </div>
  </div>

  <!-- Center: 編集フォーム -->
  <div class="center-panel panel" id="centerPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div>案件を選択または PDFをアップロード</div>
    </div>

    <div id="formArea" style="display:none;">
      <!-- 基本情報 -->
      <div class="form-section">
        <div class="section-title">顧客情報</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">お客様名 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_name" oninput="markModified(this)">
          </div>
          <div class="form-group">
            <label class="form-label">フリガナ</label>
            <input type="text" class="form-input ai-filled" id="f_kana" oninput="markModified(this)">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">電話番号 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_tel" oninput="markModified(this)">
          </div>
          <div class="form-group">
            <label class="form-label">郵便番号 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_zip" oninput="markModified(this)">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label class="form-label">住所 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_address" oninput="markModified(this)">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">お買上店舗 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_store" oninput="markModified(this)">
          </div>
          <div class="form-group">
            <label class="form-label">担当者 <span class="ai-tag">AI</span></label>
            <input type="text" class="form-input ai-filled" id="f_staff" oninput="markModified(this)">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">配送方法 <span class="ai-tag">AI</span></label>
            <select class="form-select" id="f_delivery">
              <option value="customer">お客様直送</option>
              <option value="store">店入れ</option>

// ============================================================
// 要尺計算エンジン
// ============================================================
function calcYousyaku(w, h, hida, opening, fabric, hasTagssel) {
  if (!fabric) return null;

  // 縫い代
  const hSideAllowance = (opening === '片開き') ? 15 : 30; // 左右
  const vAllowance = fabric.vAllowance || 40; // 上下

  // 横づかい判定（生地巾≥290 且つ yoko=true）
  if (fabric.yoko && fabric.width >= 290) {
    // ③横づかい
    const yousyaku = Math.ceil(((w * hida + hSideAllowance) / 100) * 10) / 10;
    const tasselAdd = hasTagssel ? 0.2 : 0;
    return {
      type: '③横づかい',
      nubaki: null,
      cutLen: null,
      yousyaku: Math.round((yousyaku + tasselAdd) * 10) / 10,
      formula: `(仕上がり幅${w}×倍ヒダ${hida}+縫い代${hSideAllowance})÷100 = ${yousyaku}m`,
      note: null
    };
  }

  // リピート判定
  if (fabric.repeat > 0) {
    // ②リピート有り
    const nubaki = Math.ceil(((w * hida) + hSideAllowance) / fabric.width);
    const repeatCount = Math.ceil((h + vAllowance) / fabric.repeat);
    const cutLen = repeatCount * fabric.repeat;
    const yousyaku = Math.round((cutLen * nubaki / 100) * 10) / 10;
    const tasselAdd = hasTagssel ? 0.2 : 0;
    return {
      type: '②リピート有り',
      nubaki,
      cutLen,
      repeatCount,
      repeatSize: fabric.repeat,
      yousyaku: Math.round((yousyaku + tasselAdd) * 10) / 10,
      formula: `継ぎ巾=${nubaki}枚 / リピート数=${repeatCount}回 / 裁ち切り=${cutLen}cm`,
      note: null
    };
  }

  // ①リピート無し
  const nubaki = Math.ceil(((w * hida) + hSideAllowance) / fabric.width);
  const cutLen = h + vAllowance;
  const yousyaku = Math.round((cutLen * nubaki / 100) * 10) / 10;
  const tasselAdd = hasTagssel ? 0.2 : 0;
  return {
    type: '①リピート無し',
    nubaki,
    cutLen,
    yousyaku: Math.round((yousyaku + tasselAdd) * 10) / 10,
    formula: `継ぎ巾=ROUNDUP((${w}×${hida}+${hSideAllowance})÷${fabric.width},0)=${nubaki}枚 / 裁ち切り=${cutLen}cm`,
    note: tasselAdd > 0 ? `タッセル分+${tasselAdd}m含む` : null
  };
}

  if (!order) return;
  const n = order.windows.length + 1;
  order.windows.push({
    label: `③窓`,
    type: 'ドレープ',
    style: '1.5倍ヒダ',
    fabricId: null,

    hook: 'Aフック',

const uploadZone = document.getElementById('uploadZone');

  e.preventDefault();
  uploadZone.classList.remove('drag');
  [...e.dataTransfer.files].forEach(f => processFile(f));
});

async function processFile(file) {
  if (!apiKey) {
    showToast('APIキーを設定してください', 'error');
    return;
  }

  showAI('PDF解析中...', `${file.name} を Claude が読み取っています`);

  try {
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'application/pdf';
    const isPDF = mediaType === 'application/pdf';

    const messages = [{
      role: 'user',
      content: [
        {
          type: isPDF ? 'document' : 'image',
          source: { type: 'base64', media_type: mediaType, data: base64 }
        },
        {
          type: 'text',
          text: `このACME発注書（カーテン受発注書）から以下の情報をJSON形式で抽出してください。
JSON以外のテキストは出力しないでください。

{
  "customer": {
    "name": "お客様名（漢字）",
    "kana": "フリガナ",
    "tel": "電話番号",
    "zip": "郵便番号",
    "address": "住所",
    "store": "お買上店舗名",
    "staff": "担当者名",
    "delivery": "customer（お客様直送）またはstore（店入れ）またはcontractor（業者直送）",
    "delivdate": "配送希望日時"
  },
  "windows": [
    {
      "label": "①掃き出し窓（などの場所）",
      "type": "ドレープ or レース",
      "style": "1.5倍ヒダ or 2倍ヒダ etc",
      "fabricName": "品名・生地名",
      "fabricCode": "品番（数字）",
      "finishW": 仕上がり幅（数値cm）,
      "finishH": 仕上がり丈（数値cm）,
      "opening": "両開き or 片開き",
      "hook": "Aフック or Bフック",
      "windows": 窓数（数値）,
      "tassel": タッセル本数（数値）,
      "lining": "なし or 裏地種別",
      "amount": 本体金額（数値・税抜）
    }
  ]
}`
        }
      ]
    }];

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2000,
        messages
      })
    });

    const data = await resp.json();
    hideAI();

    if (data.error) throw new Error(data.error.message);

    const text = data.content.find(c => c.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // 品番マスタとのマッチング
    parsed.windows.forEach(win => {
      if (win.fabricCode) {
        const m = FABRIC_MASTER.find(f => f.id === +win.fabricCode);
        if (m) win.fabricId = m.id;
      } else if (win.fabricName) {
        // 名前マッチング
        const name = win.fabricName.toLowerCase();
        const m = FABRIC_MASTER.find(f =>
          f.maker.toLowerCase().includes(name) || f.acme.toLowerCase().includes(name)
        );
        if (m) win.fabricId = m.id;
      }
    });

    const newOrder = {
      id: 'order_' + Date.now(),
      filename: file.name,
      status: 'ai_done',
      customer: parsed.customer,
      windows: parsed.windows
    };

    orders.unshift(newOrder);
    currentOrderId = newOrder.id;
    currentWindowIdx = 0;
    renderOrderList();
    renderForm();
    renderWindowTabs();
    renderWindowForm();
    renderPreview();
    showToast('PDF解析完了！内容を確認してください', 'success');

  } catch (err) {
    hideAI();
    showToast('エラー: ' + err.message, 'error');
    console.error(err);
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('ファイル読み込み失敗'));
    r.readAsDataURL(file);
  });
}

function copyToClipboard() {
  const order = orders.find(o => o.id === currentOrderId);
  if (!order) return;
  const c = order.customer;
  let text = `【ACME専用発注書】\n`;
  text += `お客様: ${c.name} 様\n住所: 〒${c.zip} ${c.address}\nTEL: ${c.tel}\n店舗: ${c.store}\n\n`;
  order.windows.forEach(win => {
    const fabric = FABRIC_MASTER.find(f => f.id === win.fabricId);
    const hidaVal = win.style === '1.5倍ヒダ' ? 1.5 : 2;
    const calc = (win.finishW && win.finishH && fabric) ?
      calcYousyaku(win.finishW, win.finishH, hidaVal, win.opening, fabric, win.tassel > 0) : null;
    text += `${win.label}: ${fabric ? fabric.maker : win.fabricName} W${win.finishW}×H${win.finishH}cm `;
    text += `${win.opening} ${win.hook} 要尺:${calc ? calc.yousyaku+'m' : '—'}\n`;
  });
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました', 'success'));
}

// ============================================================
// UI Helpers
// ============================================================
function showAI(label, sub) {
  document.getElementById('aiLabel').textContent = label;
  document.getElementById('aiSub').textContent = sub;
  document.getElementById('aiOverlay').classList.add('show');
}
function hideAI() {
  document.getElementById('aiOverlay').classList.remove('show');
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  t.innerHTML = `<span style="color:${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--accent)'}">${icon}</span> ${msg}`;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
